<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SkyCast | Live Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b2b40 0%, #1a4d5f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,240,0.08) 0%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        .weather-card {
            max-width: 650px;
            width: 100%;
            background: rgba(22, 40, 56, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 2rem 1.8rem 2.2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,245,0.2);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFF9E6, #C0E0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.35rem;
            display: inline-block;
        }

        .sub {
            color: #bbd9ff;
            font-weight: 400;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            border-left: 3px solid #ffd966;
            padding-left: 0.75rem;
            opacity: 0.9;
        }

        .search-section {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .input-wrapper {
            flex: 3;
            min-width: 160px;
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255,255,210,0.4);
            border-radius: 2.2rem;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .input-wrapper input::placeholder {
            color: #d4ecff;
            font-weight: 400;
        }

        .input-wrapper input:focus {
            border-color: #ffcf4a;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(255, 207, 74, 0.2);
        }

        button {
            background: #f5c542;
            border: none;
            padding: 0 1.6rem;
            border-radius: 2.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button i {
            font-style: normal;
            font-weight: 600;
            font-size: 1.1rem;
        }

        button:hover {
            background: #ffda77;
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .location-btn {
            background: rgba(220, 240, 255, 0.2);
            backdrop-filter: blur(8px);
            color: #f9f3d9;
            border: 1px solid rgba(255,215,130,0.7);
        }

        .location-btn:hover {
            background: #ffcf4a;
            color: #1e2f3a;
            border-color: transparent;
        }

        .weather-info {
            margin-top: 1rem;
            transition: 0.2s;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 2rem;
            color: #fff3cf;
            font-weight: 500;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,200,0.3);
            border-top: 3px solid #ffd966;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .weather-main {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
        }

        .temp-section {
            text-align: left;
        }

        .temp {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: #fff5e0;
            line-height: 1;
        }

        .temp-unit {
            font-size: 1.6rem;
            font-weight: 500;
            vertical-align: super;
        }

        .city-name {
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffefb9;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .weather-icon img {
            width: 85px;
            height: 85px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
        }

        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            font-weight: 500;
            color: #fceec7;
            margin-top: 6px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .detail-card {
            background: rgba(10, 25, 35, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 0.9rem 0.7rem;
            text-align: center;
            border: 1px solid rgba(255,215,140,0.3);
        }

        .detail-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: #b9dcff;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffeaac;
            margin-top: 6px;
        }

        .detail-unit {
            font-size: 0.85rem;
            font-weight: 400;
            color: #cce7ff;
        }

        .error-msg {
            background: rgba(220, 60, 50, 0.85);
            padding: 1rem;
            border-radius: 2rem;
            text-align: center;
            color: #fff2db;
            font-weight: 500;
            margin-top: 1rem;
            backdrop-filter: blur(8px);
        }

        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            text-align: center;
            color: #bcd3f0;
            border-top: 1px solid rgba(255,240,170,0.2);
            padding-top: 1rem;
        }

        .footer-note a {
            color: #ffde9e;
            text-decoration: none;
        }

        @media (max-width: 500px) {
            .weather-card {
                padding: 1.5rem;
            }
            .temp {
                font-size: 3rem;
            }
            .weather-icon img {
                width: 65px;
                height: 65px;
            }
            .city-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
        <h1>☁️ SkyCast</h1>
        <div class="sub">live · real-time weather</div>
    </div>

    <div class="search-section">
        <div class="input-wrapper">
            <input type="text" id="cityInput" placeholder="City name, e.g. London, Tokyo, Paris" autocomplete="off">
        </div>
        <button id="searchBtn">🔍 Search</button>
        <button id="locationBtn" class="location-btn">📍 My Location</button>
    </div>

    <div id="weatherDisplay" class="weather-info">
        <!-- dynamic content injected here -->
        <div class="loading">
            <div class="spinner"></div>
            <span>Ready — search for a city or use your location</span>
        </div>
    </div>
    <div class="footer-note">
        🌍 Powered by OpenWeatherMap • <a href="#" id="getKeyInfo">API key configured</a>
    </div>
</div>

<script>
    // ======================== CONFIGURATION =========================
    // ✅ Your OpenWeatherMap API key is inserted here
    const API_KEY = "32d0d05cde1f9a76b53199144e14b6e0";
    
    // Endpoints (current weather)
    const BASE_URL = "https://api.openweathermap.org/data/2.5/weather";
    
    // DOM elements
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const locationBtn = document.getElementById('locationBtn');
    const weatherDisplay = document.getElementById('weatherDisplay');
    const getKeyInfoLink = document.getElementById('getKeyInfo');
    
    // helper: show loading state inside weatherDisplay
    function showLoading(message = "Fetching weather data...") {
        weatherDisplay.innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <span>${message}</span>
            </div>
        `;
    }
    
    // show error message with custom text
    function showError(message) {
        weatherDisplay.innerHTML = `
            <div class="error-msg">
                ⚠️ ${message}
            </div>
        `;
    }
    
    // format wind speed (m/s)
    function formatWindSpeed(speedMs) {
        return `${speedMs.toFixed(1)} m/s`;
    }
    
    // display weather data
    function renderWeatherData(data) {
        if (!data || data.cod === "404" || data.cod === "401") {
            const errMsg = data?.message || "City not found or API key issue.";
            showError(`❌ ${errMsg}. Please check city name.`);
            return;
        }
        
        const cityName = data.name;
        const country = data.sys?.country ? `, ${data.sys.country}` : '';
        const tempC = data.main.temp;
        const feelsLike = data.main.feels_like;
        const humidity = data.main.humidity;
        const pressure = data.main.pressure;
        const windSpeed = data.wind.speed;
        const weatherDesc = data.weather[0].description;
        const iconCode = data.weather[0].icon;
        const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        let visibilityKm = (data.visibility / 1000).toFixed(1);
        
        const weatherHtml = `
            <div class="weather-main">
                <div class="temp-section">
                    <div class="temp">${Math.round(tempC)}<span class="temp-unit">°C</span></div>
                    <div class="city-name">${cityName}${country}</div>
                    <div class="description">${weatherDesc}</div>
                </div>
                <div class="weather-icon">
                    <img src="${iconUrl}" alt="${weatherDesc}" loading="lazy">
                </div>
            </div>
            <div class="details-grid">
                <div class="detail-card">
                    <div class="detail-label">🌡️ FEELS LIKE</div>
                    <div class="detail-value">${Math.round(feelsLike)}<span class="detail-unit">°C</span></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">💧 HUMIDITY</div>
                    <div class="detail-value">${humidity}<span class="detail-unit">%</span></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">🌬️ WIND</div>
                    <div class="detail-value">${formatWindSpeed(windSpeed)}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">📊 PRESSURE</div>
                    <div class="detail-value">${pressure}<span class="detail-unit">hPa</span></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">👁️ VISIBILITY</div>
                    <div class="detail-value">${visibilityKm}<span class="detail-unit">km</span></div>
                </div>
            </div>
        `;
        
        weatherDisplay.innerHTML = weatherHtml;
    }
    
    // fetch weather by city name
    async function fetchWeatherByCity(city) {
        if (!city || city.trim() === "") {
            showError("Please enter a city name.");
            return;
        }
        
        showLoading(`Searching for "${city.trim()}"...`);
        
        try {
            const url = `${BASE_URL}?q=${encodeURIComponent(city.trim())}&units=metric&appid=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (!response.ok) {
                if (data.cod === "401") throw new Error("Invalid API key. Please check your OpenWeatherMap key.");
                if (data.cod === "404") throw new Error(`City "${city}" not found. Check spelling or try another city.`);
                throw new Error(data.message || "Failed to fetch weather data.");
            }
            renderWeatherData(data);
        } catch (error) {
            console.error("Weather fetch error:", error);
            showError(error.message || "Network error. Could not retrieve weather.");
        }
    }
    
    // fetch weather by coordinates
    async function fetchWeatherByCoords(lat, lon) {
        showLoading("Getting weather for your location...");
        
        try {
            const url = `${BASE_URL}?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (!response.ok) {
                if (data.cod === "401") throw new Error("Invalid API key.");
                throw new Error(data.message || "Location weather error");
            }
            renderWeatherData(data);
        } catch (err) {
            console.error("Coords weather error:", err);
            showError(`Location error: ${err.message}. Try searching manually.`);
        }
    }
    
    // get user's current location
    function getUserLocation() {
        if (!navigator.geolocation) {
            showError("Geolocation is not supported by your browser. Please search for a city manually.");
            return;
        }
        
        showLoading("Requesting location access...");
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const { latitude, longitude } = position.coords;
                fetchWeatherByCoords(latitude, longitude);
            },
            (error) => {
                console.warn("Geolocation error:", error);
                let errorMsg = "Unable to retrieve your location. ";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        errorMsg = "Location permission denied. Please allow location access or search for a city.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        errorMsg = "Location info unavailable. Try searching by city.";
                        break;
                    case error.TIMEOUT:
                        errorMsg = "Location request timed out. Check network or search manually.";
                        break;
                    default:
                        errorMsg += "Enable location services or use city search.";
                }
                showError(errorMsg);
            },
            { timeout: 10000, enableHighAccuracy: false }
        );
    }
    
    // initial demo load: show a default city (London) to showcase
    async function initialDemoLoad() {
        try {
            showLoading("Loading weather preview...");
            const defaultCity = "London";
            const url = `${BASE_URL}?q=${defaultCity}&units=metric&appid=${API_KEY}`;
            const resp = await fetch(url);
            if (resp.ok) {
                const data = await resp.json();
                renderWeatherData(data);
            } else {
                weatherDisplay.innerHTML = `<div class="error-msg">✨ Welcome! Try searching for a city or use your location. ✨</div>`;
            }
        } catch (e) {
            weatherDisplay.innerHTML = `<div class="error-msg">🔎 Enter a city name above to see current weather conditions.</div>`;
        }
    }
    
    // Event listeners
    searchBtn.addEventListener('click', () => {
        const city = cityInput.value.trim();
        if (city === "") {
            showError("Please enter a city name (e.g., London, Mumbai, Tokyo).");
            return;
        }
        fetchWeatherByCity(city);
    });
    
    cityInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchBtn.click();
        }
    });
    
    locationBtn.addEventListener('click', () => {
        getUserLocation();
    });
    
    getKeyInfoLink.addEventListener('click', (e) => {
        e.preventDefault();
        window.open('https://openweathermap.org/appid', '_blank');
    });
    
    // start: load initial demo
    initialDemoLoad();
</script>
</body>
</html>
