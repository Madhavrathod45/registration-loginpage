<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🤖 EchoMind | Smart Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a2639 0%, #2e3b4e 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* main chatbot container */
    .chat-container {
      width: 100%;
      max-width: 550px;
      height: 85vh;
      min-height: 550px;
      background: #f8fafc;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header section */
    .chat-header {
      background: #0f172a;
      padding: 1.2rem 1.5rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #3b82f6;
    }

    .bot-avatar {
      background: #3b82f6;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 6px 12px rgba(59,130,246,0.3);
    }

    .header-text h2 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .header-text p {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .status {
      margin-left: auto;
      background: #10b981;
      padding: 5px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.8);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    /* messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #f1f5f9;
      scroll-behavior: smooth;
    }

    /* custom scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }

    /* message bubbles */
    .message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      max-width: 85%;
      animation: fadeSlideUp 0.25s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      background: #e2e8f0;
    }

    .message.user .message-avatar {
      background: #3b82f6;
      color: white;
    }

    .message.bot .message-avatar {
      background: #0f172a;
      color: white;
    }

    .bubble {
      background: white;
      padding: 0.75rem 1rem;
      border-radius: 1.2rem;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0,0,0,0.02);
      font-size: 0.9rem;
      line-height: 1.45;
      color: #0f172a;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 0.3rem;
    }

    .message.bot .bubble {
      background: white;
      border-bottom-left-radius: 0.3rem;
      border: 1px solid #e2e8f0;
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0.6rem 1rem;
      background: white;
      border-radius: 2rem;
      width: fit-content;
      border: 1px solid #e2e8f0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #94a3b8;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.2s infinite ease;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4;}
      30% { transform: translateY(-5px); opacity: 1;}
    }

    /* input area */
    .chat-input-area {
      background: white;
      padding: 1rem 1.2rem 1.3rem;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input-area input {
      flex: 1;
      padding: 0.9rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 2rem;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
      background: #fefefe;
      font-family: inherit;
    }

    .chat-input-area input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .chat-input-area button {
      background: #0f172a;
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1.3rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .chat-input-area button:hover {
      background: #3b82f6;
      transform: scale(0.96);
    }

    .chat-input-area button:active {
      transform: scale(0.92);
    }

    /* suggestions chips */
    .suggestions {
      padding: 0.5rem 1.2rem 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: white;
      border-top: 1px solid #eef2ff;
    }

    .chip {
      background: #eef2ff;
      padding: 0.4rem 0.9rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .chip:hover {
      background: #3b82f6;
      color: white;
      transform: translateY(-2px);
    }

    @media (max-width: 520px) {
      .chat-container {
        height: 90vh;
        border-radius: 1.5rem;
      }
      .message {
        max-width: 90%;
      }
      .bubble {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar">✨</div>
    <div class="header-text">
      <h2>EchoMind</h2>
      <p>always curious · always friendly</p>
    </div>
    <div class="status">
      <span class="status-dot"></span>
      <span>online</span>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <!-- welcome message will be injected via JS -->
  </div>

  <div class="suggestions" id="suggestionChips">
    <button class="chip" data-suggestion="Tell me a fun fact">🔍 Fun fact</button>
    <button class="chip" data-suggestion="How does a chatbot work?">🤖 How bots work</button>
    <button class="chip" data-suggestion="Recommend a book">📚 Book rec</button>
    <button class="chip" data-suggestion="Write a short poem">📝 Poem</button>
  </div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
    <button id="sendBtn" aria-label="Send message">➤</button>
  </div>
</div>

<script>
  (function() {
    // ---------- DOM elements ----------
    const messagesContainer = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendBtn');
    const suggestionChips = document.getElementById('suggestionChips');

    // ---------- bot state ----------
    let isTyping = false;
    let currentTypingTimeout = null;

    // ---------- helper: scroll to bottom ----------
    function scrollToBottom() {
      messagesContainer.scrollTo({
        top: messagesContainer.scrollHeight,
        behavior: 'smooth'
      });
    }

    // ---------- add a message to UI (text only, no duplicate DOM) ----------
    function addMessageToUI(text, sender, options = {}) {
      // sender: 'user' or 'bot'
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;

      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'message-avatar';
      avatarDiv.textContent = sender === 'user' ? '👤' : '🤖';

      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'bubble';
      bubbleDiv.textContent = text;

      messageDiv.appendChild(avatarDiv);
      messageDiv.appendChild(bubbleDiv);
      messagesContainer.appendChild(messageDiv);
      scrollToBottom();
    }

    // ---------- remove typing indicator if present ----------
    function removeTypingIndicator() {
      const existingTyping = document.querySelector('.typing-message');
      if (existingTyping) existingTyping.remove();
      if (currentTypingTimeout) clearTimeout(currentTypingTimeout);
      isTyping = false;
    }

    // ---------- show typing animation (bot is "thinking") ----------
    function showTypingIndicator() {
      removeTypingIndicator(); // avoid duplicates
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message bot typing-message';
      const avatarSpan = document.createElement('div');
      avatarSpan.className = 'message-avatar';
      avatarSpan.textContent = '🤖';
      const typingBubble = document.createElement('div');
      typingBubble.className = 'typing-indicator';
      typingBubble.innerHTML = '<span></span><span></span><span></span>';
      typingDiv.appendChild(avatarSpan);
      typingDiv.appendChild(typingBubble);
      messagesContainer.appendChild(typingDiv);
      scrollToBottom();
      isTyping = true;
    }

    // ---------- core brain: generate intelligent contextual reply ----------
    function generateBotReply(userMessage) {
      const msg = userMessage.toLowerCase().trim();
      
      // Greetings & basic
      if (msg.match(/^(hi|hello|hey|greetings|hola|sup|howdy)/i)) {
        return "👋 Hello there! I'm EchoMind, your friendly assistant. Ask me anything — from fun facts to writing poems, I'm here for you!";
      }
      
      // Fun fact zone
      if (msg.includes('fun fact') || msg.includes('tell me something interesting') || msg.includes('surprise me')) {
        const facts = [
          "🐙 Octopuses have three hearts and blue blood!",
          "🌌 A day on Venus is longer than a year on Venus.",
          "🍍 Pineapples take about two years to grow.",
          "📚 The first novel ever written on a typewriter was 'Tom Sawyer'.",
          "🐘 Elephants are the only mammals that can't jump.",
          "💡 Honey never spoils — archaeologists found 3000-year-old honey in tombs!"
        ];
        return `✨ Here's a spark: ${facts[Math.floor(Math.random() * facts.length)]}`;
      }
      
      // How chatbot works?
      if (msg.includes('how does') && (msg.includes('chatbot') || msg.includes('bot work'))) {
        return "🧠 Great question! I use pattern matching & rule-based logic (for now!). I scan your message for keywords, then craft a relevant reply. Some bots use AI, but I'm a smart JavaScript buddy with a little creative spark. 😊";
      }
      
      // Book recommendation
      if (msg.includes('book') && (msg.includes('recommend') || msg.includes('suggest') || msg.includes('read'))) {
        const books = [
          "📖 *'The Midnight Library'* by Matt Haig — a beautiful journey between life and regrets.",
          "🚀 *'Project Hail Mary'* by Andy Weir — witty sci-fi with heart.",
          "🐉 *'The Name of the Wind'* by Patrick Rothfuss — lyrical fantasy classic.",
          "🧠 *'Atomic Habits'* by James Clear — transformative tiny changes."
        ];
        return books[Math.floor(Math.random() * books.length)] + " Hope you enjoy! 📚";
      }
      
      // Poem generation
      if (msg.includes('poem') || (msg.includes('write') && msg.includes('poem'))) {
        const shortPoems = [
          "🌙 *Moonlit whispers*  \nStars paint the sky, \nDreams float on high, \nQuiet moments stay, \nTill the break of day.",
          "🌸 *Gentle bloom*  \nSoft breeze sings low, \nPetals gently glow, \nLife finds a way, \nIn the sun's warm ray.",
          "⚡ *Digital soul*  \nCode & spark, light in the dark, \nLogic flows, yet emotion grows, \nI'm but a mirror, yet I feel near — \nyour words sincere."
        ];
        return `✍️ Here's a little poem just for you:\n\n${shortPoems[Math.floor(Math.random() * shortPoems.length)]}`;
      }
      
      // Time / date awareness
      if (msg.includes('time') || msg.includes('clock') || msg.includes('date')) {
        const now = new Date();
        const formattedTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const formattedDate = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        return `🕒 Current time is ${formattedTime} on ${formattedDate}. Need anything else?`;
      }
      
      // Help / what can you do
      if (msg.includes('help') || msg.includes('what can you do') || msg.includes('capabilities')) {
        return "🌟 I can: \n• Tell fun facts 🐙\n• Recommend books 📚\n• Write short poems ✍️\n• Explain how chatbots work 🤖\n• Answer about time/date ⏰\n• Crack jokes 😄\n• Chat casually! Try clicking suggestion chips or type anything.";
      }
      
      // Jokes
      if (msg.includes('joke') || msg.includes('funny')) {
        const jokes = [
          "Why do programmers prefer dark mode? Because light attracts bugs! 😆",
          "What do you call a fake noodle? An impasta! 🍝",
          "Why don’t scientists trust atoms? Because they make up everything! ⚛️",
          "How do you organize a space party? You planet! 🪐"
        ];
        return `😂 ${jokes[Math.floor(Math.random() * jokes.length)]}`;
      }
      
      // Compliments or thanks
      if (msg.includes('thank') || msg.includes('thanks') || msg.includes('appreciate')) {
        return "💖 You're most welcome! It's a joy to chat with you. Feel free to ask more or try the suggestion chips!";
      }
      
      // Fallback for "how are you" etc
      if (msg.includes('how are you') || msg.includes('how do you feel')) {
        return "🌈 I'm running on pure JavaScript happiness! Always ready to help. What about you?";
      }
      
      // If user mentions love, coding, motivation
      if (msg.includes('love') || msg.includes('motivation')) {
        return "❤️ That's wonderful! Remember: small steps every day create massive change. Keep shining! ✨";
      }
      
      // If message is really short like "?" or "ok"
      if (msg.length < 3 && !msg.includes('hi')) {
        return "🤔 Hmm, I didn't catch that. Try asking something like 'tell me a fun fact', 'recommend a book', or 'write a poem'!";
      }
      
      // default clever response for anything else
      const cleverFallbacks = [
        "🤖 Interesting! Tell me more — I love learning from you.",
        "💡 That's a great topic! Want a fun fact, a poem, or a book suggestion instead?",
        "🧩 I'm here to assist. You can also click the suggestion chips for inspiration!",
        "✨ I'm not 100% sure, but I can tell you a joke or give a random fact. Type 'fun fact'!"
      ];
      return cleverFallbacks[Math.floor(Math.random() * cleverFallbacks.length)];
    }
    
    // ---------- simulate bot response with typing delay (natural feel) ----------
    function sendBotMessage(text) {
      return new Promise((resolve) => {
        // first show typing indicator
        showTypingIndicator();
        // delay between 600ms and 1400ms (human-like)
        const delay = 700 + Math.random() * 600;
        currentTypingTimeout = setTimeout(() => {
          removeTypingIndicator();
          addMessageToUI(text, 'bot');
          resolve();
        }, delay);
      });
    }
    
    // ---------- process user message pipeline ----------
    async function processUserMessage(rawMessage) {
      if (!rawMessage || rawMessage.trim() === '') return;
      const trimmedMessage = rawMessage.trim();
      
      // 1. add user message to UI immediately
      addMessageToUI(trimmedMessage, 'user');
      
      // 2. generate reply from bot brain
      const botReply = generateBotReply(trimmedMessage);
      
      // 3. disable input while bot is typing? optional but better UX
      const inputField = userInput;
      const sendBtn = sendButton;
      inputField.disabled = true;
      sendBtn.disabled = true;
      
      // 4. simulate bot typing & send reply
      await sendBotMessage(botReply);
      
      // 5. re-enable input and focus
      inputField.disabled = false;
      sendBtn.disabled = false;
      inputField.focus();
    }
    
    // ---------- handle send from button or enter key ----------
    function handleSend() {
      const message = userInput.value;
      if (message.trim() === "") return;
      processUserMessage(message);
      userInput.value = ""; // clear input
    }
    
    // ---------- suggestion chip handler ----------
    function onChipClick(event) {
      const chip = event.target.closest('.chip');
      if (!chip) return;
      const suggestionText = chip.getAttribute('data-suggestion');
      if (suggestionText) {
        // set input field to suggestion and auto-send for seamless experience
        userInput.value = suggestionText;
        handleSend();
      }
    }
    
    // ---------- initial welcome message ----------
    function initWelcome() {
      const welcomeText = "👋 Hey there! I'm EchoMind. 💬\nAsk me anything — try 'fun fact', 'recommend a book', 'poem', or just say hi!";
      addMessageToUI(welcomeText, 'bot');
    }
    
    // ---------- Event binding ----------
    sendButton.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !userInput.disabled) {
        e.preventDefault();
        handleSend();
      }
    });
    
    // suggestion chips delegation
    suggestionChips.addEventListener('click', onChipClick);
    
    // Focus input on load
    window.addEventListener('load', () => {
      initWelcome();
      userInput.focus();
    });
    
    // Optional: handle mobile keyboard nicer - scroll on input focus
    userInput.addEventListener('focus', () => {
      setTimeout(() => scrollToBottom(), 300);
    });
  })();
</script>
</body>
</html>
